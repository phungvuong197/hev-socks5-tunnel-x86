name: Build-Win32-Manual
on: workflow_dispatch

jobs:
  build-win32:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Lay code va submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 2. Cai dat bo compiler MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 make

      - name: 3. Tien hanh build (Fix loi arpa/inet.h)
        run: |
          # SYSTEM=windows: Để code không gọi thư viện Linux (arpa/inet.h)
          # CROSS_PREFIX=i686...: Để chỉ định đầu ra là 32-bit
          # LDFLAGS="-static": Để chạy được trên mọi máy Win 10 mà không thiếu file .dll
          make SYSTEM=windows CROSS_PREFIX=i686-w64-mingw32- LDFLAGS="-static"
          
          mkdir final_build
          if [ -f "hev-socks5-tunnel.exe" ]; then
            mv hev-socks5-tunnel.exe final_build/
          else
            # Truong hop file build nam trong thu muc bin
            mv bin/hev-socks5-tunnel.exe final_build/ || mv bin/windows-x86/hev-socks5-tunnel.exe final_build/ || true
          fi

      - name: 4. Day file len de ban tai ve
        uses: actions/upload-artifact@v4
        with:
          name: Hev-Tunnel-Win10-32bit
          path: final_build/
